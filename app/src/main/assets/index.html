<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Janus 卡片制作器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" onerror="document.getElementById('cdnFallback').style.display='flex'"></script>
<div id="cdnFallback" style="display:none;position:fixed;inset:0;background:#0a0a0f;color:#e8e8f0;z-index:9999;align-items:center;justify-content:center;flex-direction:column;padding:32px;text-align:center">
  <p style="font-size:18px">⚠️ 需要网络连接加载 JSZip 库</p>
  <p style="font-size:14px;color:#888;margin-top:8px">请连接网络后重启应用</p>
</div>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080d;--surface:#111118;--surface2:#1a1a24;--surface3:#222230;
  --border:#2a2a3a;--border2:#3a3a50;
  --text:#e8e8f0;--text2:#8888a0;--text3:#5a5a70;
  --accent:#6c5ce7;--accent2:#a29bfe;--accent-glow:rgba(108,92,231,.15);
  --green:#00b894;--green2:#00d9a7;
  --red:#e17055;--orange:#fdcb6e;
  --radius:14px;--radius-sm:10px;
  --shadow:0 8px 32px rgba(0,0,0,.4);
  --transition:all .25s cubic-bezier(.4,0,.2,1);
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--text)}

/* ─── App Shell ─── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ─── Top Bar ─── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:100;
}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-left h1{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}
.topbar-left h1 span{font-size:20px}
.topbar-left .badge{font-size:10px;color:var(--accent2);background:var(--accent-glow);padding:2px 8px;border-radius:6px;font-weight:600}

/* ─── Step Indicator ─── */
.steps{display:flex;align-items:center;gap:0}
.step-dot{
  display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:20px;
  font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;transition:var(--transition);
  position:relative;
}
.step-dot:hover{color:var(--text2)}
.step-dot.active{color:var(--accent2);background:var(--accent-glow)}
.step-dot.done{color:var(--green)}
.step-num{
  width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;background:var(--surface2);border:1px solid var(--border);transition:var(--transition);
}
.step-dot.active .step-num{background:var(--accent);border-color:var(--accent);color:#fff}
.step-dot.done .step-num{background:var(--green);border-color:var(--green);color:#fff}
.step-line{width:24px;height:1px;background:var(--border);margin:0 4px}
.step-line.done{background:var(--green)}

/* ─── Content Area ─── */
.content{flex:1;overflow:hidden;position:relative}
.page{
  position:absolute;inset:0;display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transform:translateX(20px);
  transition:opacity .3s ease,transform .3s ease;
}
.page.active{opacity:1;pointer-events:auto;transform:translateX(0)}

/* ─── Page 1: Template Selection ─── */
.page-tpl{padding:28px 32px;overflow-y:auto}
.page-title{font-size:22px;font-weight:700;margin-bottom:4px}
.page-subtitle{font-size:13px;color:var(--text2);margin-bottom:24px}

.tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.tpl-card{
  padding:18px 20px;border-radius:var(--radius);cursor:pointer;
  border:1.5px solid var(--border);background:var(--surface);
  transition:var(--transition);position:relative;overflow:hidden;
}
.tpl-card::before{
  content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent-glow),transparent);
  opacity:0;transition:opacity .3s;
}
.tpl-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow)}
.tpl-card:hover::before{opacity:.5}
.tpl-card.active{border-color:var(--accent);background:var(--accent-glow);box-shadow:0 0 0 1px var(--accent),var(--shadow)}
.tpl-card.active::before{opacity:1}
.tpl-icon{font-size:28px;margin-bottom:10px;display:block;position:relative}
.tpl-card-name{font-size:14px;font-weight:700;margin-bottom:4px;position:relative}
.tpl-card-desc{font-size:11px;color:var(--text2);line-height:1.4;position:relative}

/* ─── Page 2: Config ─── */
.page-config{padding:28px 32px;overflow-y:auto}
.config-header{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.config-header .tpl-icon{font-size:32px}
.config-header h2{font-size:18px;font-weight:700}
.config-header p{font-size:12px;color:var(--text2);margin-top:2px}

.config-section{margin-bottom:24px}
.config-section-title{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--text3);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;
}
.config-section-title span{font-size:13px}

.config-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;color:var(--text2);font-weight:500}
.field input[type=text],.field input[type=number],.field select,.field textarea{
  padding:9px 12px;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none;transition:var(--transition);
  font-family:inherit;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.field input[type=color]{height:40px;padding:4px;cursor:pointer;border-radius:var(--radius-sm)}
.field input[type=range]{padding:0;background:transparent;border:none;height:36px}
.field .hint{font-size:10px;color:var(--text3)}

/* Color field inline */
.field-color{flex-direction:row;align-items:center;gap:10px}
.field-color input[type=color]{width:40px;flex-shrink:0}
.field-color .color-val{font-size:11px;color:var(--text3);font-family:monospace}

/* Custom elements */
.el-toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.el-btn{
  padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);
  color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:var(--transition);
  display:flex;align-items:center;gap:5px;
}
.el-btn:hover{border-color:var(--accent);color:var(--accent2)}
.el-btn .el-btn-icon{font-size:14px}

.el-list{display:flex;flex-direction:column;gap:8px}
.el-item{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);
  cursor:pointer;transition:var(--transition);
}
.el-item:hover{border-color:var(--border2)}
.el-item.active{border-color:var(--accent);background:var(--accent-glow)}
.el-badge{
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;
  background:var(--accent);color:#fff;text-transform:uppercase;letter-spacing:.3px;
  flex-shrink:0;
}
.el-item-name{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.el-item-del{
  background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;
  padding:4px 6px;border-radius:6px;transition:var(--transition);
}
.el-item-del:hover{color:var(--red);background:rgba(225,112,85,.1)}

.el-detail{
  margin-top:14px;padding:16px;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}

/* Media file picker */
.media-picker{
  display:flex;align-items:center;gap:12px;padding:12px;
  background:var(--surface);border:1.5px dashed var(--border);border-radius:var(--radius-sm);
  cursor:pointer;transition:var(--transition);margin-bottom:12px;
}
.media-picker:hover{border-color:var(--accent);background:var(--accent-glow)}
.media-picker.has-file{border-style:solid;border-color:var(--green)}
.media-picker-icon{font-size:24px;flex-shrink:0}
.media-picker-info{flex:1;min-width:0}
.media-picker-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.media-picker-hint{font-size:10px;color:var(--text3);margin-top:2px}
.media-picker-thumb{
  width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;
  background:var(--surface3);
}
.media-picker-change{
  padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);
  color:var(--text2);font-size:11px;cursor:pointer;transition:var(--transition);flex-shrink:0;
}
.media-picker-change:hover{border-color:var(--accent);color:var(--accent2)}

/* ─── Page 3: Preview & Export ─── */
.page-preview{padding:24px 32px;overflow-y:auto}
.preview-layout{display:grid;grid-template-columns:1fr 1fr;gap:24px;height:100%}

.preview-phone-wrap{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.preview-phone{
  width:420px;height:252px;border-radius:20px;overflow:hidden;position:relative;
  background:#000;border:2px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,.6),inset 0 0 0 1px rgba(255,255,255,.05);
}
.preview-screen{width:100%;height:100%;position:relative;overflow:hidden}
.preview-camera{
  position:absolute;left:0;top:0;width:74px;height:100%;z-index:10;pointer-events:none;
  background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(255,255,255,.03) 4px,rgba(255,255,255,.03) 5px);
  border-right:1px dashed rgba(255,255,255,.12);
  display:flex;align-items:flex-start;justify-content:center;
}
.preview-camera::after{content:'📷';font-size:10px;margin-top:8px;opacity:.2}
.preview-camera.hidden{display:none}
.preview-content{position:absolute;inset:0}
.preview-placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--text3);gap:8px;
}
.preview-placeholder span{font-size:40px}
.preview-placeholder p{font-size:13px}
.preview-device-label{font-size:11px;color:var(--text3);text-align:center}

.preview-side{display:flex;flex-direction:column;gap:16px}
.preview-side h3{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}

.xml-preview{
  flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:auto;max-height:400px;
}
.xml-preview pre{
  padding:16px;font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-all;
  color:var(--accent2);font-family:'SF Mono',Monaco,'Cascadia Code',monospace;
}
.xml-preview::-webkit-scrollbar{width:5px}
.xml-preview::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.preview-actions{display:flex;gap:10px;flex-wrap:wrap}

/* ─── Buttons ─── */
.btn{
  padding:10px 20px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:600;
  cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:7px;
  font-family:inherit;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);box-shadow:0 4px 16px rgba(108,92,231,.3)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent2)}
.btn-export{background:var(--green);color:#fff}
.btn-export:hover{background:var(--green2);box-shadow:0 4px 16px rgba(0,184,148,.3)}
.btn-back{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-back:hover{border-color:var(--text2);color:var(--text)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn .btn-icon{font-size:15px}

/* ─── Bottom Bar (nav) ─── */
.bottombar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;background:var(--surface);border-top:1px solid var(--border);
  flex-shrink:0;
}
.bottombar-left,.bottombar-right{display:flex;gap:10px}

/* ─── Device Selector (Page 3) ─── */
.device-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.device-row label{font-size:12px;color:var(--text2);font-weight:500}
.device-row select{
  padding:6px 10px;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:12px;outline:none;
}
.device-row .check-label{
  display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer;
}

/* ─── Toast ─── */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);
  padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;
  opacity:0;transition:all .3s ease;z-index:999;pointer-events:none;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--green);color:#fff}
.toast.error{background:var(--red);color:#fff}

/* ─── Responsive ─── */
@media(max-width:768px){
  .topbar{padding:10px 16px}
  .topbar-left h1{font-size:15px}
  .step-dot{padding:5px 8px}
  .step-dot .step-label{display:none}
  .page-tpl,.page-config,.page-preview{padding:20px 16px}
  .tpl-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  .config-grid{grid-template-columns:1fr}
  .preview-layout{grid-template-columns:1fr}
  .preview-phone{width:320px;height:192px}
  .bottombar{padding:10px 16px}
}
</style>
</head>
<body>

<!-- Hidden file inputs -->
<input type="file" id="fileImagePick" accept="image/*" style="display:none">
<input type="file" id="fileVideoPick" accept="video/*" style="display:none">

<div class="app">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <h1><span>🃏</span> Janus 卡片制作器</h1>
      <span class="badge">MAML</span>
    </div>
    <div class="steps" id="stepIndicator">
      <div class="step-dot active" data-step="0" onclick="goStep(0)">
        <span class="step-num">1</span>
        <span class="step-label">选择模板</span>
      </div>
      <div class="step-line"></div>
      <div class="step-dot" data-step="1" onclick="goStep(1)">
        <span class="step-num">2</span>
        <span class="step-label">配置参数</span>
      </div>
      <div class="step-line"></div>
      <div class="step-dot" data-step="2" onclick="goStep(2)">
        <span class="step-num">3</span>
        <span class="step-label">预览导出</span>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Step 1: Template Selection -->
    <div class="page page-tpl active" id="page0">
      <div class="page-title">选择卡片模板</div>
      <div class="page-subtitle">从预设模板开始，或选择自定义从零创建</div>
      <div class="tpl-grid" id="tplGrid"></div>
    </div>

    <!-- Step 2: Config -->
    <div class="page page-config" id="page1">
      <div class="config-header">
        <span class="tpl-icon" id="cfgIcon"></span>
        <div>
          <h2 id="cfgTitle">配置</h2>
          <p id="cfgDesc">调整参数以自定义卡片</p>
        </div>
      </div>
      <div id="cfgContent"></div>
    </div>

    <!-- Step 3: Preview & Export -->
    <div class="page page-preview" id="page2">
      <div class="device-row">
        <label>机型</label>
        <select id="deviceSelect" onchange="renderPreview()">
          <option value="q200">Pro — 904×572</option>
          <option value="p2">Pro Max — 976×596</option>
        </select>
        <label class="check-label">
          <input type="checkbox" id="showCamera" checked onchange="renderPreview()"> 摄像头遮挡区
        </label>
      </div>
      <div class="preview-layout">
        <div class="preview-phone-wrap">
          <div class="preview-phone">
            <div class="preview-screen">
              <div class="preview-camera" id="previewCamera"></div>
              <div class="preview-content" id="previewContent">
                <div class="preview-placeholder">
                  <span>📱</span>
                  <p>点击下方「生成预览」查看效果</p>
                </div>
              </div>
            </div>
          </div>
          <div class="preview-device-label" id="deviceLabel">Pro — 904 × 572</div>
        </div>
        <div class="preview-side">
          <h3>📄 MAML XML</h3>
          <div class="xml-preview"><pre id="codeContent">选择模板并配置后，点击「生成预览」查看 XML</pre></div>
          <div class="preview-actions">
            <button class="btn btn-secondary" onclick="renderPreview()"><span class="btn-icon">🔄</span> 生成预览</button>
            <button class="btn btn-export" onclick="exportZip()"><span class="btn-icon">📦</span> 导出 ZIP</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Bottom Bar -->
  <div class="bottombar">
    <div class="bottombar-left">
      <button class="btn btn-back" id="btnBack" onclick="prevStep()" style="display:none">
        <span class="btn-icon">←</span> 上一步
      </button>
    </div>
    <div class="bottombar-right">
      <button class="btn btn-primary" id="btnNext" onclick="nextStep()">
        下一步 <span class="btn-icon">→</span>
      </button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ─── MAML Templates ───────────────────────────────────────────────

const TEMPLATES = [
  {
    id: 'clock', icon: '⏰', name: '时钟卡片', desc: '显示当前时间和日期',
    config: [
      { group: '基本', fields: [
        { key: 'cardName', label: '卡片名称', type: 'text', default: '时钟卡片' },
        { key: 'bgColor', label: '背景颜色', type: 'color', default: '#000000' },
      ]},
      { group: '样式', fields: [
        { key: 'timeColor', label: '时间颜色', type: 'color', default: '#ffffff' },
        { key: 'dateColor', label: '日期颜色', type: 'color', default: '#888888' },
        { key: 'timeSize', label: '时间字号', type: 'range', min: 24, max: 96, default: 64 },
      ]},
      { group: '格式', fields: [
        { key: 'dateFormat', label: '日期格式', type: 'select', options: [
          { v: 'yyyy/MM/dd EEEE', l: '2026/04/04 星期五' },
          { v: 'MM-dd EEEE', l: '04-04 星期五' },
          { v: 'MM/dd', l: '04/04' },
        ], default: 'yyyy/MM/dd EEEE' },
        { key: 'timeFormat', label: '时间格式', type: 'select', options: [
          { v: 'HH:mm', l: '24小时制' },
          { v: 'hh:mm', l: '12小时制' },
        ], default: 'HH:mm' },
      ]},
    ],
    gen: (c) => `<Widget screenWidth="480" frameRate="0" scaleByDensity="false" useVariableUpdater="DateTime.Minute" name="${esc(c.cardName)}">
  <Rectangle w="#view_width" h="#view_height" fillColor="${c.bgColor}" />
  <Text textExp="formatDate('${c.timeFormat}', #time_sys)" x="30" y="80" size="${c.timeSize}" color="${c.timeColor}" />
  <Text textExp="formatDate('${c.dateFormat}', #time_sys)" x="30" y="${80 + c.timeSize * 0.9}" size="20" color="${c.dateColor}" />
</Widget>`
  },
  {
    id: 'quote', icon: '💬', name: '名言卡片', desc: '显示一段文字或名言',
    config: [
      { group: '基本', fields: [
        { key: 'cardName', label: '卡片名称', type: 'text', default: '名言卡片' },
        { key: 'bgColor', label: '背景颜色', type: 'color', default: '#1a1a2e' },
      ]},
      { group: '内容', fields: [
        { key: 'text', label: '文字内容', type: 'textarea', default: 'Stay hungry.\nStay foolish.' },
        { key: 'textColor', label: '文字颜色', type: 'color', default: '#ffffff' },
        { key: 'textSize', label: '字号', type: 'range', min: 14, max: 64, default: 28 },
        { key: 'author', label: '作者', type: 'text', default: '— Steve Jobs' },
        { key: 'authorColor', label: '作者颜色', type: 'color', default: '#6c5ce7' },
      ]},
    ],
    gen: (c) => `<Widget screenWidth="336" frameRate="0" scaleByDensity="false" name="${esc(c.cardName)}">
  <Var name="scale" type="number" expression="(#view_width / 336)" />
  <Var name="marginL" type="number" expression="(#view_width * 0.30)" />
  <Var name="safeW" type="number" expression="(#view_width - #marginL - 20)" />
  <Rectangle w="#view_width" h="#view_height" fillColor="${c.bgColor}" />
  <Group x="#marginL" y="40" w="#safeW">
    <Text text="${esc(c.text)}" size="${c.textSize}" color="${c.textColor}" w="#safeW" multiLine="true" />
    <Text text="${esc(c.author)}" x="0" y="(#view_height - 80)" size="16" color="${c.authorColor}" />

// ─── State ─────────────────────────────────────────────────────────

let currentStep = 0;
let currentTpl = null;
let configValues = {};
let customElements = [];
let selectedElIdx = -1;
let previewDirty = true;
let uploadedFiles = {};  // { filename: { data: ArrayBuffer, mimeType, dataUrl, originalName } }
let pendingMediaAdd = null; // 'image' | 'video' | null — tracks which type we're adding via file picker
let pendingMediaReplace = -1; // element index being replaced, or -1

// ─── Step Navigation ───────────────────────────────────────────────

function goStep(n) {
  if (n === 1 && !currentTpl) { toast('请先选择一个模板', 'error'); return; }
  if (n === 2 && !currentTpl) { toast('请先选择模板并配置', 'error'); return; }
  currentStep = n;
  document.querySelectorAll('.page').forEach((p, i) => {
    p.classList.toggle('active', i === n);
  });
  document.querySelectorAll('.step-dot').forEach((d, i) => {
    d.classList.remove('active', 'done');
    if (i === n) d.classList.add('active');
    else if (i < n) d.classList.add('done');
  });
  document.querySelectorAll('.step-line').forEach((l, i) => {
    l.classList.toggle('done', i < n);
  });
  document.getElementById('btnBack').style.display = n > 0 ? '' : 'none';
  const btnNext = document.getElementById('btnNext');
  if (n === 2) {
    btnNext.style.display = 'none';
  } else {
    btnNext.style.display = '';
    btnNext.innerHTML = n === 0
      ? '下一步 <span class="btn-icon">→</span>'
      : '预览 & 导出 <span class="btn-icon">→</span>';
  }
  if (n === 1) renderConfig();
  if (n === 2 && previewDirty) renderPreview();
}
function nextStep() { goStep(currentStep + 1); }
function prevStep() { goStep(currentStep - 1); }

// ─── Init ──────────────────────────────────────────────────────────

function init() {
  renderTplGrid();
  // File input listeners
  document.getElementById('fileImagePick').addEventListener('change', handleFilePicked);
  document.getElementById('fileVideoPick').addEventListener('change', handleFilePicked);
}

function renderTplGrid() {
  const grid = document.getElementById('tplGrid');
  grid.innerHTML = TEMPLATES.map(t =>
    `<div class="tpl-card${currentTpl?.id === t.id ? ' active' : ''}" onclick="selectTemplate('${t.id}')">
      <span class="tpl-icon">${t.icon}</span>
      <div class="tpl-card-name">${t.name}</div>
      <div class="tpl-card-desc">${t.desc}</div>
    </div>`
  ).join('');
}

function selectTemplate(id) {
  const tpl = TEMPLATES.find(t => t.id === id);
  if (!tpl) return;
  currentTpl = tpl;
  configValues = {};
  tpl.config.forEach(g => g.fields.forEach(f => configValues[f.key] = f.default));
  customElements = tpl.id === 'custom' ? [
    { type: 'text', text: 'Hello Card', x: 30, y: 60, size: 28, color: '#ffffff' }
  ] : [];
  selectedElIdx = -1;
  previewDirty = true;
  renderTplGrid();
  goStep(1);
}

// ─── Config Rendering ──────────────────────────────────────────────

function renderConfig() {
  if (!currentTpl) return;
  document.getElementById('cfgIcon').textContent = currentTpl.icon;
  document.getElementById('cfgTitle').textContent = currentTpl.name;
  document.getElementById('cfgDesc').textContent = currentTpl.desc;

  let html = '';

  // Config groups
  currentTpl.config.forEach(group => {
    html += `<div class="config-section">
      <div class="config-section-title"><span>▸</span> ${group.group}</div>
      <div class="config-grid">`;
    group.fields.forEach(f => { html += renderField(f); });
    html += `</div></div>`;
  });

  // Custom elements editor
  if (currentTpl.id === 'custom') {
    html += `<div class="config-section">
      <div class="config-section-title"><span>▸</span> 元素</div>
      <div class="el-toolbar">
        <button class="el-btn" onclick="addElement('text')"><span class="el-btn-icon">T</span> 文字</button>
        <button class="el-btn" onclick="addElement('rectangle')"><span class="el-btn-icon">▢</span> 矩形</button>
        <button class="el-btn" onclick="addElement('circle')"><span class="el-btn-icon">○</span> 圆形</button>
        <button class="el-btn" onclick="pickMedia('image')"><span class="el-btn-icon">🖼</span> 图片</button>
        <button class="el-btn" onclick="pickMedia('video')"><span class="el-btn-icon">🎬</span> 视频</button>
      </div>
      <div class="el-list">`;
    customElements.forEach((el, i) => {
      const label = el.type === 'text' ? el.text
        : el.type === 'image' ? '🖼 ' + (el.fileName || '图片')
        : el.type === 'video' ? '🎬 ' + (el.fileName || '视频')
        : el.type + ' #' + (i+1);
      const inCam = isInCameraZone(el);
      html += `<div class="el-item${selectedElIdx===i?' active':''}" onclick="selectElement(${i})">
        <span class="el-badge">${el.type}</span>
        <span class="el-item-name">${esc(label)}</span>
        ${inCam ? '<span title="在摄像头遮挡区内" style="color:#e17055;font-size:14px">⚠️</span>' : ''}
        <button class="el-item-del" onclick="event.stopPropagation();removeElement(${i})">✕</button>
      </div>`;
    });
    if (customElements.length === 0) {
      html += `<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">点击上方按钮添加元素</div>`;
    }
    html += `</div>`;

    if (selectedElIdx >= 0 && selectedElIdx < customElements.length) {
      html += renderElementEditor(customElements[selectedElIdx], selectedElIdx);
    }
    html += `</div>`;
  }

  document.getElementById('cfgContent').innerHTML = html;
  document.querySelectorAll('.color-val').forEach(el => {
    const input = el.previousElementSibling;
    if (input) el.textContent = input.value;
  });
}

function renderField(f) {
  const v = configValues[f.key];
  if (f.type === 'text') return `<div class="field"><label>${f.label}</label><input type="text" value="${esc(v)}" onchange="setCfg('${f.key}',this.value)"></div>`;
  if (f.type === 'textarea') return `<div class="field"><label>${f.label}</label><textarea rows="3" onchange="setCfg('${f.key}',this.value)">${esc(v)}</textarea></div>`;
  if (f.type === 'color') return `<div class="field field-color"><label>${f.label}</label><input type="color" value="${v}" onchange="setCfg('${f.key}',this.value);this.nextElementSibling.textContent=this.value"><span class="color-val">${v}</span></div>`;
  if (f.type === 'range') return `<div class="field"><label>${f.label}: <strong>${v}</strong></label><input type="range" min="${f.min}" max="${f.max}" value="${v}" oninput="setCfg('${f.key}',+this.value);this.previousElementSibling.querySelector('strong').textContent=this.value"></div>`;
  if (f.type === 'select') return `<div class="field"><label>${f.label}</label><select onchange="setCfg('${f.key}',this.value)">${f.options.map(o => `<option value="${o.v}"${v===o.v?' selected':''}>${o.l}</option>`).join('')}</select></div>`;
  return '';
}

function renderElementEditor(el, idx) {
  let html = `<div class="el-detail">`;

  // Camera zone warning
  if (isInCameraZone(el)) {
    html += `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;margin-bottom:12px;background:rgba(225,112,85,0.1);border:1px solid rgba(225,112,85,0.3);border-radius:8px;font-size:12px;color:#e17055">
      <span>⚠️</span> 此元素位于摄像头遮挡区内，导出后可能被遮挡。建议将 X 调整到 ≥ ${Math.ceil(480 * CAMERA_ZONE_RATIO)}
    </div>`;
  }

  // Media picker for image/video
  if (el.type === 'image' || el.type === 'video') {
    const isImage = el.type === 'image';
    const fileInfo = el.fileName ? uploadedFiles[el.fileName] : null;
    const hasFile = !!fileInfo;

    html += `<div class="media-picker ${hasFile ? 'has-file' : ''}" onclick="pickMediaReplace(${idx})">`;
    if (hasFile && isImage) {
      html += `<img class="media-picker-thumb" src="${fileInfo.dataUrl}" alt="">`;
    } else if (hasFile && !isImage) {
      html += `<span class="media-picker-icon">🎬</span>`;
    } else {
      html += `<span class="media-picker-icon">${isImage ? '🖼' : '🎬'}</span>`;
    }
    html += `<div class="media-picker-info">
      <div class="media-picker-name">${hasFile ? esc(fileInfo.originalName) : (isImage ? '点击选择图片' : '点击选择视频')}</div>
      <div class="media-picker-hint">${hasFile ? formatFileSize(fileInfo.data.byteLength) + ' · 点击更换' : (isImage ? '支持 JPG / PNG / GIF / WebP' : '支持 MP4 / WebM / 3GP')}</div>
    </div>`;
    if (hasFile) {
      html += `<button class="media-picker-change" onclick="event.stopPropagation();pickMediaReplace(${idx})">更换</button>`;
    }
    html += `</div>`;

    // Position & size
    html += `<div class="config-grid">
      <div class="field"><label>X</label><input type="number" value="${el.x}" onchange="setElProp('x',+this.value)"></div>
      <div class="field"><label>Y</label><input type="number" value="${el.y}" onchange="setElProp('y',+this.value)"></div>
      <div class="field"><label>宽</label><input type="number" value="${el.w||100}" onchange="setElProp('w',+this.value)"></div>

    </div>`;

  // Text element

    html += `<div class="config-grid">

        <option value="right"${el.textAlign==='right'?' selected':''}>右对齐</option>
      </select></div>
      <div class="field"><label>加粗</label><select onchange="setElProp('bold',this.value==='true')">
        <option value="false"${!el.bold?' selected':''}>否</option>

      <div class="field"><label>多行</label><select onchange="setElProp('multiLine',this.value==='true')">
        <option value="false"${!el.multiLine?' selected':''}>否</option>
        <option value="true"${el.multiLine?' selected':''}>是</option>
      </select></div>
      <div class="field"><label>宽度</label><input type="number" value="${el.w||200}" onchange="setElProp('w',+this.value)"></div>
      <div class="field"><label>X</label><input type="number" value="${el.x}" onchange="setElProp('x',+this.value)"></div>
      <div class="field"><label>Y</label><input type="number" value="${el.y}" onchange="setElProp('y',+this.value)"></div>
    </div>`;
  }
  // Rectangle
  else if (el.type === 'rectangle') {
    html += `<div class="config-grid">
      <div class="field"><label>X</label><input type="number" value="${el.x}" onchange="setElProp('x',+this.value)"></div>

      <div class="field"><label>中心 Y</label><input type="number" value="${el.y}" onchange="setElProp('y',+this.value)"></div>
      <div class="field"><label>半径</label><input type="number" value="${el.r}" onchange="setElProp('r',+this.value)"></div>
      <div class="field field-color"><label>颜色</label><input type="color" value="${el.color}" onchange="setElProp('color',this.value);this.nextElementSibling.textContent=this.value"><span class="color-val">${el.color}</span></div>
    </div>`;
  }

  html += `</div>`;
  return html;
}

function setCfg(key, val) {
  configValues[key] = val;
  previewDirty = true;
}

// ─── Media Upload ──────────────────────────────────────────────────

function pickMedia(type) {
  pendingMediaAdd = type;
  pendingMediaReplace = -1;
  const input = document.getElementById(type === 'image' ? 'fileImagePick' : 'fileVideoPick');
  input.value = '';
  input.click();
}

function pickMediaReplace(idx) {
  const el = customElements[idx];
  if (!el) return;
  pendingMediaAdd = el.type;
  pendingMediaReplace = idx;
  const input = document.getElementById(el.type === 'image' ? 'fileImagePick' : 'fileVideoPick');
  input.value = '';
  input.click();
}

function handleFilePicked(e) {
  const file = e.target.files[0];
  if (!file) return;

  const type = pendingMediaAdd;
  const replaceIdx = pendingMediaReplace;
  pendingMediaAdd = null;
  pendingMediaReplace = -1;

  // Generate a unique filename for packing
  const ext = file.name.split('.').pop() || (type === 'image' ? 'png' : 'mp4');
  const safeName = 'media_' + Date.now() + '.' + ext;

  const reader = new FileReader();
  reader.onload = function(ev) {
    const arrayBuf = ev.target.result;
    // Create data URL for preview
    const blob = new Blob([arrayBuf], { type: file.type });
    const urlReader = new FileReader();
    urlReader.onload = function() {
      uploadedFiles[safeName] = {
        data: arrayBuf,
        mimeType: file.type,
        dataUrl: urlReader.result,
        originalName: file.name
      };

      if (replaceIdx >= 0 && replaceIdx < customElements.length) {
        // Replace file on existing element
        customElements[replaceIdx].fileName = safeName;
        customElements[replaceIdx].src = safeName;
      } else {
        // Add new element
        const el = {
          type: type,
          fileName: safeName,
          src: safeName,
          x: 10, y: 60,
          w: type === 'image' ? 200 : 240,
          h: type === 'image' ? 200 : 135,
        };
        customElements.push(el);
        selectedElIdx = customElements.length - 1;
      }

      previewDirty = true;
      renderConfig();
      toast(file.name + ' 已添加', 'success');
    };
    urlReader.readAsDataURL(blob);
  };
  reader.readAsArrayBuffer(file);
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

// ─── Custom Elements ───────────────────────────────────────────────

function addElement(type) {
  const defs = {
    text: { type: 'text', text: '新文字', x: 10, y: 60, size: 24, color: '#ffffff', textAlign: 'left', bold: false, multiLine: false, w: 200 },
    rectangle: { type: 'rectangle', x: 10, y: 60, w: 100, h: 40, color: '#333333', radius: 0 },
    circle: { type: 'circle', x: 50, y: 100, r: 30, color: '#6c5ce7' },
  };
  if (defs[type]) {
    customElements.push(JSON.parse(JSON.stringify(defs[type])));
    selectedElIdx = customElements.length - 1;
    previewDirty = true;
    renderConfig();
  }
}

function selectElement(idx) {
  selectedElIdx = idx;
  renderConfig();
}

function removeElement(idx) {
  const el = customElements[idx];
  // Clean up uploaded file if no other element uses it
  if (el && el.fileName) {
    const stillUsed = customElements.some((e, i) => i !== idx && e.fileName === el.fileName);
    if (!stillUsed) delete uploadedFiles[el.fileName];
  }
  customElements.splice(idx, 1);
  if (selectedElIdx >= customElements.length) selectedElIdx = customElements.length - 1;
  previewDirty = true;
  renderConfig();
}

function setElProp(prop, val) {
  if (selectedElIdx >= 0) {
    customElements[selectedElIdx][prop] = val;
    previewDirty = true;
  }
}

// ─── MAML Generation ───────────────────────────────────────────────

function generateMAML() {
  if (!currentTpl) return '';
  if (currentTpl.id === 'custom') return generateCustomMAML();
  return currentTpl.gen(configValues);
}

// Camera safe zone: 30% of screen width on the left
const CAMERA_ZONE_RATIO = 0.30;

function isInCameraZone(el) {
  const elRight = el.x + (el.w || (el.r ? el.r * 2 : 0) || (el.size ? el.text.length * el.size * 0.6 : 50));
  return el.x < 480 * CAMERA_ZONE_RATIO;
}

function generateCustomMAML() {
  const c = configValues;
  let body = `  <Var name="marginL" type="number" expression="(#view_width * ${CAMERA_ZONE_RATIO})" />\n`;
  body += `  <Rectangle w="#view_width" h="#view_height" fillColor="${c.bgColor}" />\n`;
  body += `  <Group x="#marginL" y="0">\n`;
  customElements.forEach(el => {
    if (el.type === 'text') {
      const align = el.textAlign && el.textAlign !== 'left' ? ` textAlign="${el.textAlign}"` : '';
      const ml = el.multiLine ? ' multiLine="true"' : '';
      const w = el.multiLine || (el.textAlign && el.textAlign !== 'left') ? ` w="${el.w||200}"` : '';
      body += `    <Text text="${esc(el.text)}" x="${el.x}" y="${el.y}" size="${el.size}" color="${el.color}"${w}${align}${ml}${el.bold ? ' bold="true"' : ''} />\n`;
    else if (el.type === 'rectangle') body += `    <Rectangle x="${el.x}" y="${el.y}" w="${el.w}" h="${el.h}" fillColor="${el.color}"${el.radius ? ` cornerRadius="${el.radius}"` : ''} />\n`;
    else if (el.type === 'circle') body += `    <Circle x="${el.x}" y="${el.y}" r="${el.r}" fillColor="${el.color}" />\n`;
    else if (el.type === 'image') body += `    <Image src="${esc(el.src)}" x="${el.x}" y="${el.y}" w="${el.w||100}" h="${el.h||100}" />\n`;
    else if (el.type === 'video') body += `    <Video src="${esc(el.src)}" x="${el.x}" y="${el.y}" w="${el.w||240}" h="${el.h||135}" autoPlay="true" loop="true" />\n`;
  });
  body += `  </Group>\n`;
  return `<Widget screenWidth="480" frameRate="0" scaleByDensity="false" name="${esc(c.cardName)}">\n${body}</Widget>`;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── Preview ───────────────────────────────────────────────────────

function renderPreview() {
  if (!currentTpl) return;
  const device = document.getElementById('deviceSelect').value;
  const showCam = document.getElementById('showCamera').checked;

  document.getElementById('deviceLabel').textContent =
    device === 'p2' ? 'Pro Max — 976 × 596' : 'Pro — 904 × 572';

  const camera = document.getElementById('previewCamera');
  camera.style.width = showCam ? '30%' : '0';
  camera.className = 'preview-camera' + (showCam ? '' : ' hidden');

  const content = document.getElementById('previewContent');
  content.innerHTML = renderPreviewHTML(showCam);

  document.getElementById('codeContent').textContent = generateMAML();
  previewDirty = false;
}

function renderPreviewHTML(showCam) {
  if (!currentTpl) return '';
  const c = configValues;
  // Landscape preview: 420px wide, MAML is 480px wide
  const PW = 420; // preview width
  const S = PW / 480; // scale factor = 0.875
  const camW = showCam ? PW * CAMERA_ZONE_RATIO : 0; // camera zone in preview px

  if (currentTpl.id === 'clock') {
    const now = new Date();
    const timeStr = c.timeFormat === 'HH:mm'
      ? String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0')
      : (now.getHours() % 12 || 12) + ':' + String(now.getMinutes()).padStart(2,'0');
    const days = ['日','一','二','三','四','五','六'];
    const dateStr = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} 星期${days[now.getDay()]}`;
    return `<div style="position:absolute;inset:0;background:${c.bgColor}"></div>
      <div style="position:absolute;left:${camW+10}px;top:30px;font-size:${Math.round(c.timeSize*S)}px;color:${c.timeColor};font-weight:700;letter-spacing:1px">${timeStr}</div>
      <div style="position:absolute;left:${camW+10}px;top:${30+c.timeSize*S+6}px;font-size:${Math.round(20*S)}px;color:${c.dateColor}">${dateStr}</div>`;
  }

  if (currentTpl.id === 'quote') {
    const lines = c.text.split('\n');
    return `<div style="position:absolute;inset:0;background:${c.bgColor}"></div>
      <div style="position:absolute;left:${camW+10}px;top:24px;right:10px;font-size:${Math.round(c.textSize*S)}px;color:${c.textColor};line-height:1.4">${lines.map(l=>esc(l)).join('<br>')}</div>
      <div style="position:absolute;left:${camW+10}px;bottom:20px;font-size:${Math.round(16*S)}px;color:${c.authorColor}">${esc(c.author)}</div>`;
  }

  if (currentTpl.id === 'battery') {
    return `<div style="position:absolute;inset:0;background:${c.bgColor}"></div>
      <div style="position:absolute;left:${camW+10}px;top:20px;font-size:${Math.round(18*S)}px;color:${c.textColor};opacity:0.6">电量</div>
      <div style="position:absolute;left:${camW+10}px;top:42px;font-size:${Math.round(56*S)}px;color:${c.textColor};font-weight:700">78%</div>
      <div style="position:absolute;left:${camW+10}px;top:110px;width:${PW-camW-20}px;height:7px;background:#333;border-radius:4px">
        <div style="width:78%;height:100%;background:${c.barColor};border-radius:4px"></div>
      </div>
      <div style="position:absolute;left:${camW+10}px;top:126px;font-size:${Math.round(16*S)}px;color:${c.textColor};opacity:0.5">电量充足</div>`;
  }

  if (currentTpl.id === 'status') {
    const items = [c.item1, c.item2, c.item3, c.item4].filter(Boolean);
    return `<div style="position:absolute;inset:0;background:${c.bgColor}"></div>
      <div style="position:absolute;left:${camW+6}px;top:18px;display:flex;align-items:center;gap:6px">
        <div style="width:3px;height:${Math.round(24*S)}px;background:${c.accentColor};border-radius:2px"></div>
        <span style="font-size:${Math.round(22*S)}px;color:${c.textColor};font-weight:600">${esc(c.title)}</span>
      </div>
      ${items.map((t,i) => `<div style="position:absolute;left:${camW+16}px;top:${50+i*Math.round(40*S)}px;font-size:${Math.round(16*S)}px;color:${c.textColor};opacity:0.8">${esc(t)}</div>`).join('')}`;
  }

  if (currentTpl.id === 'countdown') {
    return `<div style="position:absolute;inset:0;background:${c.bgColor}"></div>
      <div style="position:absolute;left:${camW+10}px;top:20px;font-size:${Math.round(18*S)}px;color:${c.textColor};opacity:0.6">${esc(c.eventName)}</div>
      <div style="position:absolute;left:${camW+10}px;top:44px;font-size:${Math.round(72*S)}px;color:${c.accentColor};font-weight:700">42</div>
      <div style="position:absolute;left:${camW+10}px;top:${44+72*S+4}px;font-size:${Math.round(20*S)}px;color:${c.textColor};opacity:0.5">天</div>`;
  }

  if (currentTpl.id === 'music') {
    return `<div style="position:absolute;inset:0;background:${c.bgColor}"></div>
      <div style="position:absolute;left:${camW+10}px;top:18px;display:flex;gap:8px;align-items:center">
        <div style="width:${Math.round(48*S)}px;height:${Math.round(48*S)}px;background:${c.accentColor};border-radius:${Math.round(12*S)}px;display:flex;align-items:center;justify-content:center;font-size:${Math.round(28*S)}px;color:#fff">♪</div>
        <span style="font-size:${Math.round(12*S)}px;color:${c.accentColor}">正在播放</span>
      </div>
      <div style="position:absolute;left:${camW+10}px;top:${18+48*S+10}px;font-size:${Math.round(24*S)}px;color:${c.titleColor};font-weight:600">歌曲名称</div>
      <div style="position:absolute;left:${camW+10}px;top:${18+48*S+10+24*S+4}px;font-size:${Math.round(16*S)}px;color:${c.artistColor}">歌手名称</div>
      <div style="position:absolute;left:${camW+10}px;right:10px;top:${18+48*S+10+24*S+4+22}px;height:2px;background:#333;border-radius:1px">
        <div style="width:40%;height:100%;background:${c.accentColor};border-radius:1px"></div>
      </div>`;
  }

  if (currentTpl.id === 'gradient') {
    const lines = c.text.split('\n');
    return `<div style="position:absolute;left:0;top:0;width:50%;height:100%;background:${c.bgColor1}"></div>
      <div style="position:absolute;left:50%;top:0;width:50%;height:100%;background:${c.bgColor2};opacity:0.7"></div>
      <div style="position:absolute;left:${camW}px;right:0;top:30%;text-align:center;font-size:${Math.round(c.textSize*S)}px;color:${c.textColor};font-weight:700;line-height:1.3">${lines.map(l=>esc(l)).join('<br>')}</div>`;
  }

  if (currentTpl.id === 'custom') {
    let html = `<div style="position:absolute;inset:0;background:${c.bgColor}"></div>`;
    customElements.forEach((el, i) => {
      // Elements are in Group x="#marginL", so add camera zone offset
      const px = camW + el.x * S;
      const py = el.y * S;
      const inCam = px < camW;
      const selected = i === selectedElIdx;
      let bdr = '';
      if (selected && inCam) bdr = 'outline:2px solid #e17055;outline-offset:2px;';
      else if (selected) bdr = 'outline:1.5px dashed #6c5ce7;outline-offset:2px;';
      else if (inCam) bdr = 'outline:1.5px dashed rgba(225,112,85,0.6);outline-offset:2px;';

      if (el.type === 'text') {
        const txtAlign = el.textAlign || 'left';
        const fw = el.bold ? 'font-weight:700;' : '';
        const ta = txtAlign !== 'left' ? `text-align:${txtAlign};` : '';
        const w = el.multiLine || txtAlign !== 'left' ? `width:${(el.w||200)*S}px;` : '';
        const lh = el.multiLine ? 'white-space:pre-wrap;line-height:1.4;' : '';
        html += `<div style="position:absolute;left:${px}px;top:${py}px;font-size:${el.size*S}px;color:${el.color};${w}${ta}${fw}${lh}${bdr}">${esc(el.text)}</div>`;
      } else if (el.type === 'rectangle') {
        html += `<div style="position:absolute;left:${px}px;top:${py}px;width:${el.w*S}px;height:${el.h*S}px;background:${el.color};border-radius:${(el.radius||0)*S}px;${bdr}"></div>`;
      } else if (el.type === 'circle') {
        html += `<div style="position:absolute;left:${camW+(el.x-el.r)*S}px;top:${(el.y-el.r)*S}px;width:${el.r*2*S}px;height:${el.r*2*S}px;background:${el.color};border-radius:50%;${bdr}"></div>`;
      } else if (el.type === 'image') {
        const fileInfo = el.fileName ? uploadedFiles[el.fileName] : null;
        if (fileInfo) {
          html += `<img src="${fileInfo.dataUrl}" style="position:absolute;left:${px}px;top:${py}px;width:${(el.w||100)*S}px;height:${(el.h||100)*S}px;object-fit:cover;border-radius:2px;${bdr}">`;
        } else {
          html += `<div style="position:absolute;left:${px}px;top:${py}px;width:${(el.w||100)*S}px;height:${(el.h||100)*S}px;background:#222;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#666;${bdr}">🖼</div>`;
        }
      } else if (el.type === 'video') {
        const fileInfo = el.fileName ? uploadedFiles[el.fileName] : null;
        if (fileInfo) {
          html += `<video src="${fileInfo.dataUrl}" muted loop autoplay style="position:absolute;left:${px}px;top:${py}px;width:${(el.w||240)*S}px;height:${(el.h||135)*S}px;object-fit:cover;border-radius:2px;${bdr}"></video>`;
        } else {
          html += `<div style="position:absolute;left:${px}px;top:${py}px;width:${(el.w||240)*S}px;height:${(el.h||135)*S}px;background:#1a1a2e;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#555;${bdr}">🎬</div>`;
        }
      }
    });
    return html;
  }

  return '';
}

// ─── Export ────────────────────────────────────────────────────────

async function exportZip() {
  if (typeof JSZip === 'undefined') { toast('JSZip 未加载，请检查网络', 'error'); return; }
  const maml = generateMAML();
  if (!maml) { toast('请先选择模板', 'error'); return; }

  const zip = new JSZip();
  zip.file('manifest.xml', maml);

  if (currentTpl.id !== 'custom') {
    zip.file('var_config.xml', `<?xml version="1.0" encoding="UTF-8"?>
<WidgetConfig version="1">
  <OnOff name="isDisplayDefaultBg" displayTitle="显示默认背景" default="0"/>
</WidgetConfig>`);
  }

  // Pack uploaded images and videos
  if (currentTpl?.id === 'custom') {
    const usedFiles = new Set();
    customElements.forEach(el => {
      if ((el.type === 'image' || el.type === 'video') && el.fileName && uploadedFiles[el.fileName]) {
        usedFiles.add(el.fileName);
      }
    });
    const imgFolder = zip.folder('images');
    const vidFolder = zip.folder('videos');
    usedFiles.forEach(fname => {
      const info = uploadedFiles[fname];
      const isVideo = info.mimeType.startsWith('video/');
      if (isVideo) {
        vidFolder.file(fname, info.data);
      } else {
        imgFolder.file(fname, info.data);
      }
    });
  }

  const blob = await zip.generateAsync({ type: 'blob' });
  const fileName = (configValues.cardName || 'card') + '.zip';

  if (typeof AndroidBridge !== 'undefined') {
    const reader = new FileReader();
    reader.onload = function() {
      AndroidBridge.saveZip(reader.result.split(',')[1], fileName);
    };
    reader.readAsDataURL(blob);
    toast('✅ ZIP 已导出: ' + fileName, 'success');
    return;
  }

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = fileName; a.click();
  URL.revokeObjectURL(url);
  toast('✅ ZIP 已导出: ' + fileName, 'success');
}

// ─── Utils ─────────────────────────────────────────────────────────

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || 'success');
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => el.classList.remove('show'), 2500);
}

init();
