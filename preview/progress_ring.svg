<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 596 596">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0a1a2a"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
  </defs>
  <rect width="596" height="596" rx="24" fill="url(#bg)"/>
  <!-- Ring background -->
  <circle cx="220" cy="200" r="130" fill="none" stroke="#1a2a3a" stroke-width="18"/>
  <!-- Ring progress (68% = ~245 degrees) -->
  <circle cx="220" cy="200" r="130" fill="none" stroke="url(#ringGrad)" stroke-width="18"
    stroke-dasharray="552" stroke-dashoffset="177" stroke-linecap="round"
    transform="rotate(-90 220 200)"/>
  <!-- Percentage text -->
  <text x="220" y="190" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="60" font-weight="800" fill="#ffffff">68%</text>
  <!-- Goal name -->
  <text x="220" y="225" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#888888">年度阅读</text>
  <!-- Stats below ring -->
  <text x="130" y="380" font-family="sans-serif" font-size="24" font-weight="700" fill="#ffffff">68</text>
  <text x="175" y="380" font-family="sans-serif" font-size="16" fill="#666666">/ 100 本</text>
  <!-- Remaining -->
  <text x="130" y="415" font-family="sans-serif" font-size="14" fill="#666666">还差 32 本</text>
  <!-- Decorative -->
  <circle cx="480" cy="120" r="60" fill="#4fc3f7" opacity="0.04"/>
  <circle cx="500" cy="400" r="80" fill="#7c4dff" opacity="0.03"/>
  <!-- Label -->
  <rect x="60" y="500" width="130" height="36" rx="18" fill="#4fc3f7" fill-opacity="0.15"/>
  <text x="125" y="524" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#4fc3f7">🎯 目标进度</text>
</svg>
