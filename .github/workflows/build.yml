name: Build Android APK

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo dev)" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.5"

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Rename APK
        if: success()
        run: |
          APK=$(find app/build/outputs -name "*.apk" | head -1)
          cp "$APK" "janus-card-maker-${{ steps.version.outputs.tag }}.apk"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: janus-card-maker-apk
          path: janus-card-maker-${{ steps.version.outputs.tag }}.apk

      - name: Upload APK to Release
        if: github.event_name == 'release' && success()
        uses: softprops/action-gh-release@v2
        with:
          files: janus-card-maker-${{ steps.version.outputs.tag }}.apk
